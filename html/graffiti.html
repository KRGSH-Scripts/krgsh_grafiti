<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 512px;
            height: 512px;
            overflow: hidden;
            background: transparent;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <img id="graffiti-img" src="" alt="">
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imgUrl = urlParams.get('url');
        if (imgUrl) {
            document.getElementById('graffiti-img').src = imgUrl;
        }
    </script>
</body>
</html>
